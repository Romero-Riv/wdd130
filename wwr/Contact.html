<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Discover the history, mission, and exciting rafting adventures offered by Rapids Rafting Company. Experience unforgettable outdoor thrills.">
    <meta name="author" content="Alexis Eduardo Rivera Romero">
    <title>Contact Us and the rafting company name</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <img src="images/zdownriver.png" alt="Logo Rapids Rafting Company" class="logo">

        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>Rapids Rafting Company</h1>
            <p>123 Green Dolphin Street</p>
            <p>Port St. Lucie</p>
            <p>+1 999 999 9999</p>
            <p>info@rafting.com</p>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="contact-content">

            <!-- GOOGLE MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Port+St+Lucie&output=embed"
                  loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <p>Message Purpose</p>

                <input type="radio" id="general" name="purpose" value="general" required>
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>

                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-cards">

                <figure>
                    <img src="images/employe1.jpg" alt="River Guide">
                    <figcaption>River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employe2.jpg" alt="Safety Instructor">
                    <figcaption>Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employe3.jpg" alt="Trip Coordinator">
                    <figcaption>Trip Coordinator</figcaption>
                </figure>

            </div>
        </section>

    </main>


    <!-- FOOTER -->
    <footer class="footer">
        <p>©2026 Rapids Rafting Company | Alexis Eduardo Rivera Romero</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>

            <a href="https://youtube.com">
                <img src="images/youtube.png" alt="YouTube Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
